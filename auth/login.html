<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduClass | Iniciar Sesión</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <img src="../images/Fondo login.jpeg" alt="educlass fondo" class = "fondo-login">

    <div class="login-container">

        <img src="" alt="">
        <div class="login-card">

            <div class="logo-section">
                <img src="../images/EduClass solo logo 2.png" alt="EduClass">
                <h1>EduClass</h1>
                <p>Aprende, participa y crece.</p>
            </div>

            <form id="loginForm">

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="Correo electrónico"
                        required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock icon-left"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                        required>

                    <button
                        type="button"
                        id="togglePassword"
                        class="toggle-password">

                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn-login">
                    Iniciar Sesión
                </button>

            </form>

            <div class="extra-links">
                <a href="#">¿Olvidaste tu contraseña?</a>

                <p>
                    ¿No tienes cuenta?
                    <a href="signup.html">
                        Crear cuenta
                    </a>
                </p>
            </div>

        </div>
        <div id="modalMensaje" class="modal-mensaje">
            <div class="modal-contenido">
                <div id="iconoMensaje" class="icono">
                    <i class="fa-solid fa-circle-info"></i>
                </div>

                <h2 id="tituloMensaje">Mensaje</h2>

                <p id="textoMensaje">
                    Aquí aparecerá el mensaje.
                </p>

                <div class="botones-modal">
                    <button
                        id="btnRegistro"
                        class="btn-registro"
                        style="display:none;"
                    >
                        Registrarme
                    </button>

                    <button
                        id="btnCerrar"
                        class="btn-cerrar"
                    >
                        Entendido
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>

</body>

</html>
